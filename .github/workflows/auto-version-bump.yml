name: Version bump + merge via label

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-with-bump:
    if: github.event.label.name == 'Merge queue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version on the PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Enable auto-merge
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          sleep 5
          gh pr merge "$PR_NUMBER" \
            --auto \
            --merge \
            --delete-branch \
            --subject "Merge PR #$PR_NUMBER" \
            --body ""
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for merge and delete branch
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          BRANCH=${{ github.event.pull_request.head.ref }}
          echo "Waiting for PR #$PR_NUMBER to be merged..."
          for i in $(seq 1 30); do
            STATE=$(gh pr view "$PR_NUMBER" --json state -q '.state' 2>/dev/null)
            if [ "$STATE" = "MERGED" ]; then
              echo "PR merged, deleting branch $BRANCH..."
              gh api "repos/${{ github.repository }}/git/refs/heads/$BRANCH" -X DELETE
              exit 0
            fi
            sleep 10
          done
          echo "PR was not merged after 30 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
