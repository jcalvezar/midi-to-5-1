name: Version bump + merge via label

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-with-bump:
    if: github.event.label.name == 'Merge queue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version on the PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Enable Auto-Merge and Force Delete Branch
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          BRANCH_NAME=${{ github.event.pull_request.head.ref }}
          
          echo "1. Activando auto-merge para el PR #$PR_NUMBER..."
          # Usamos --auto para que GitHub lo mergee apenas termine de procesar el push anterior
          gh pr merge "$PR_NUMBER" \
            --auto \
            --merge \
            --subject "Merge PR #$PR_NUMBER" \
            --body ""
          
          echo "2. Esperando 10 segundos a que GitHub procese e incremente el commit..."
          sleep 10
          
          echo "3. Forzando el borrado de la rama en el repositorio..."
          # Esto le pega directo al servidor de Git para borrar la rama, ignorando el estado del PR
          git push origin --delete "$BRANCH_NAME" || true
          
          echo "4. Limpieza completada."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
