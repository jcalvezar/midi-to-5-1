name: Version bump + merge via label

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-with-bump:
    if: github.event.label.name == 'Merge queue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version on the PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Wait for PR to become mergeable
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          for i in $(seq 1 30); do
            STATE=$(gh pr view "$PR_NUMBER" --json mergeable -q '.mergeable' 2>/dev/null)
            if [ "$STATE" = "MERGEABLE" ]; then
              echo "PR is mergeable after ${i} checks"
              exit 0
            fi
            echo "Waiting for mergeable... ($i/30)"
            sleep 5
          done
          echo "PR did not become mergeable after 30 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR and delete branch
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          gh pr merge "$PR_NUMBER" \
            --merge \
            --subject "Merge PR #$PR_NUMBER" \
            --body ""
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
