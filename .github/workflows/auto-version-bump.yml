name: Version bump + merge via label

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-with-bump:
    if: github.event.label.name == 'Merge queue'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version on the PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Merge PR and delete branch immediately
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          BRANCH_NAME=${{ github.event.pull_request.head.ref }}
          
          echo "Merging PR #$PR_NUMBER..."
          # Hacemos el merge directo (espera a que termine)
          gh pr merge "$PR_NUMBER" \
            --merge \
            --subject "Merge PR #$PR_NUMBER" \
            --body ""
          
          echo "PR Merged successfully. Deleting branch $BRANCH_NAME..."
          # Borramos la rama usando la CLI de forma explícita justo después
          gh pr close "$PR_NUMBER" --delete-branch || git push origin --delete "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
